name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.DROPLET_HOST }} << 'ENDSSH'
          set -e
          cd /root/GetPaidClients
          git config --global --add safe.directory /root/GetPaidClients
          echo "🔄 Pulling latest code..."
          git fetch origin main
          git reset --hard origin/main
          echo "📦 Installing dependencies..."
          npm install --production=false
          echo "🏗 Building application..."
          npm run build
          echo "🚀 Starting/restarting PM2 process..."
          pm2 restart getpaidclients || pm2 start npm --name "getpaidclients" -- start -- -p 8000
          pm2 save
          echo "✅ Deployment completed!"
          ENDSSH
